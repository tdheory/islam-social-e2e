name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Какой тест запускать (smoke, login, registration, all)'
        required: true
        default: 'all'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    - name: Set up Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Run Playwright tests
      env:
        # Передаем ваши секреты в переменные окружения для тестов
        MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        YANDEX_USER: ${{ secrets.YANDEX_USER }}
        YANDEX_APP_PASSWORD: ${{ secrets.YANDEX_APP_PASSWORD }}
        GITHUB_OWNER: ${{ secrets.MY_GITHUB_OWNER }}
        GITHUB_REPO: ${{ secrets.MY_GITHUB_REPO }}
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      run: |
        # Определяем тип теста (если запуск по кнопке — берем инпут, если по push — ставим all)
        TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
        
        if [ "$TEST_TYPE" = "login" ]; then
          npx playwright test tests/login.spec.ts
        elif [ "$TEST_TYPE" = "registration" ]; then
          npx playwright test tests/registration.spec.ts
        elif [ "$TEST_TYPE" = "smoke" ]; then
          npx playwright test tests/smoke.spec.ts
        else
          npx playwright test
        fi

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4.4.3
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14