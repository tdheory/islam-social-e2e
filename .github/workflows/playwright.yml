name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Какой тест запускать (smoke, login, registration, all)'
        required: true
        default: 'all'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Run Playwright tests
      env:
        GMAIL_USER: 'islam.social.qa@gmail.com'
        GMAIL_APP_PASSWORD: 'iwfnzrkscdtkbqqp'
        YANDEX_USER: 'vi9ong@yandex.com'
        YANDEX_APP_PASSWORD: 'gtpwxhpfvxrrpnni'
      run: |
        if [ "${{ github.event.inputs.test_type }}" = "login" ]; then
          npx playwright test tests/login.spec.ts
        elif [ "${{ github.event.inputs.test_type }}" = "registration" ]; then
          npx playwright test tests/registration.spec.ts
        elif [ "${{ github.event.inputs.test_type }}" = "smoke" ]; then
          npx playwright test tests/smoke.spec.ts
        else
          npx playwright test
        fi

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14