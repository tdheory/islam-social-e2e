name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    # Возможность запускать тесты вручную из интерфейса GitHub
    inputs:
      test_type:
        description: 'Какой тест запускать (smoke, login, registration, all)'
        required: true
        default: 'all'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Умное кэширование зависимостей node_modules

    - name: Install dependencies
      run: npm ci

    # Проверяем, есть ли сохраненные браузеры с прошлых запусков
    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    # Скачиваем браузеры только если они обновились или кэш пустой
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    # Если браузеры в кэше, быстро доставляем системные библиотеки Linux
    - name: Install Playwright OS Dependencies
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    # Гибкий запуск тестов в зависимости от выбора
    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" = "login" ]; then
          npx playwright test tests/login.spec.ts
        elif [ "${{ github.event.inputs.test_type }}" = "registration" ]; then
          npx playwright test tests/registration.spec.ts
        elif [ "${{ github.event.inputs.test_type }}" = "smoke" ]; then
          npx playwright test tests/smoke.spec.ts
        else
          npx playwright test # По умолчанию запускает вообще ВСЕ тесты параллельно
        fi

    # Всегда сохраняем отчет (даже если тесты упали), чтобы посмотреть скриншоты
    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14